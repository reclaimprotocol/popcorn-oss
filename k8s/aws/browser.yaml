apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-pool-aws
  labels:
    app: browser-node
spec:
  replicas: 2
  selector:
    matchLabels:
      app: browser-node
  template:
    metadata:
      labels:
        app: browser-node
    spec:
      containers:
      - name: neko
        image: 342772716647.dkr.ecr.us-east-2.amazonaws.com/popcorn/browser-node:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "3Gi"
            cpu: "2000m"
        securityContext:
          capabilities:
            add: ["SYS_ADMIN"]
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: NEKO_SCREEN
          value: "1920x1080@30"
        - name: NEKO_PASSWORD
          value: "neko"
        - name: NEKO_PASSWORD_ADMIN
          value: "admin"
        - name: NEKO_EPR
          value: "52000-52100"
        - name: NEKO_WEBRTC_ICE_UDP_MUX
          value: "true"
        - name: NEKO_NAT1TO1
          value: "3.12.182.11"
        - name: NEKO_ICESERVERS
          value: '[{"urls":["stun:stun.relay.metered.ca:80"]},{"urls":["turn:global.relay.metered.ca:80"],"username":"d56480eaf09129ab3dff9f46","credential":"mO2dolzJOVmNGy8A"},{"urls":["turn:global.relay.metered.ca:80?transport=tcp"],"username":"d56480eaf09129ab3dff9f46","credential":"mO2dolzJOVmNGy8A"},{"urls":["turn:global.relay.metered.ca:443"],"username":"d56480eaf09129ab3dff9f46","credential":"mO2dolzJOVmNGy8A"},{"urls":["turns:global.relay.metered.ca:443?transport=tcp"],"username":"d56480eaf09129ab3dff9f46","credential":"mO2dolzJOVmNGy8A"}]'
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      nodeSelector:
        node_type: standard
        security: snp-enabled
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
