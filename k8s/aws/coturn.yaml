apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  labels:
    app: coturn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
    spec:
      containers:
      - name: coturn
        image: coturn/coturn:4.6.2
        args:
        - "-n" # no config file, use command line
        - "--log-file=stdout"
        - "--min-port=49152"
        - "--max-port=65535"
        - "--use-auth-secret"
        - "--static-auth-secret=popcorn_secret"
        - "--lt-cred-mech"
        - "--realm=neko"
        - "--no-tls"
        - "--no-dtls"
        # IMPORTANT: external-ip must be set to the LoadBalancer IP for it to work properly
        # We'll use a placeholder and replace it later or let it auto-discover if possible
        # For now, we rely on mapped ports.
        ports:
        - containerPort: 3478
          protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: coturn
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb" # Network Load Balancer for UDP
spec:
  selector:
    app: coturn
  type: LoadBalancer
  ports:
    - name: turn-udp
      port: 3478
      targetPort: 3478
      protocol: UDP
