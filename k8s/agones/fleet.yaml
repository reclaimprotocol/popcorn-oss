apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: browser-fleet
  namespace: default
spec:
  replicas: 2
  scheduling: Packed
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: browser-node
    spec:
      # health: # Removed to use Agones defaults (8080) now that Neko is on 8082
      #   disabled: true
      ports:
        - name: http
          containerPort: 8082
          portPolicy: None
          protocol: TCP
        - name: cdp
          containerPort: 9222
          portPolicy: None
          protocol: TCP
        - name: kernel-api
          containerPort: 10001
          portPolicy: None
          protocol: TCP
      template:
        spec:
          containers:
          - name: neko
            image: popcorn/browser-node:local
            imagePullPolicy: Never
            resources:
              requests:
                memory: "1Gi"
                cpu: "500m"
              limits:
                memory: "2Gi"
                cpu: "1000m"
            securityContext:
              capabilities:
                add: ["SYS_ADMIN"]
            env:
            - name: REDIS_HOST
              value: "redis"
            - name: NEKO_SCREEN
              value: "1920x1080@30"
            - name: NEKO_PASSWORD
              value: "neko"
            - name: NEKO_PASSWORD_ADMIN
              value: "admin"
            - name: NEKO_ICESERVERS
              value: '[{"urls":["stun:stun.relay.metered.ca:80"]},{"urls":["turn:global.relay.metered.ca:80"],"username":"d56480eaf09129ab3dff9f46","credential":"mO2dolzJOVmNGy8A"}]'
            volumeMounts:
            - mountPath: /dev/shm
              name: dshm
          volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
