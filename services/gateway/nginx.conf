worker_processes 1;

events {
    worker_connections 10240;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Enable access logs for debugging
    access_log /dev/stdout;
    error_log /dev/stderr info;

    # Logic Flow:
    # 1. Shared dictionary to "micro-cache" IPs (Extreme Speed)
    lua_shared_dict pod_cache 10m;

    # DNS Resolver for K8s Service Discovery (used for internal redis service name)
    resolver RESOLVER_IP valid=5s; # Auto-configured by entrypoint.sh
    # In GKE, typically the node's resolver handles it, or correct ClusterIP.
    # We will use the service name in connect() which requires resolver? 
    # Actually lua-resty-redis connect method accepts IP or Hostname.
    # If Hostname, we need resolver. Let's try standard K8s DNS.

    server {
        listen 80;
        server_name _;

        # Dynamic Path-Based Routing: /browser/<session_id>/...
        location ~ ^/browser/([^/]+)/([^/]+)(.*) {
            set $session_id $1;
            set $token $2;
            set $rest_uri $3;
            set $target_ip '';

            access_by_lua_block {
                local auth = require "auth"
                auth.check(true, ngx.var.token)
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000) -- 1 second timeout

                local session_id = ngx.var.session_id
                local cache = ngx.shared.pod_cache

                -- Check local memory cache first
                local ip = cache:get(session_id)
                if not ip then
                    -- Cache miss: Connect to Redis
                    -- Using K8s default DNS for redis service
                    local ok, err = red:connect("redis.default.svc.cluster.local", 6379)
                    if not ok then
                        ngx.log(ngx.ERR, "failed to connect to redis: ", err)
                        return ngx.exit(500)
                    end

                    ip, err = red:get("route:" .. session_id)
                    if not ip or ip == ngx.null then
                        ngx.log(ngx.WARN, "No route found for session: ", session_id)
                        return ngx.exit(404)
                    end

                    -- Store in local cache for 2 seconds to avoid Redis thrashing
                    cache:set(session_id, ip, 2)
                end

                ngx.var.target_ip = ip
            }

            # Rewrite path to strip /browser/<session_id>/<token>
            if ($rest_uri = "") {
                rewrite ^/browser/[^/]+/[^/]+$ / break;
            }
            if ($rest_uri != "") {
                rewrite ^/browser/[^/]+/[^/]+(.*)$ $1 break;
            }

            # Proxy using the variable fetched from Redis
            proxy_pass http://$target_ip:8080;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            
            # Security / Forwarding Headers
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for WSS
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # CDP Exposure
        location ~ ^/cdp/([^/]+)(.*) {
            set $session_id $1;
            set $rest_uri $2;
            set $target_ip '';

            access_by_lua_block {
                local auth = require "auth"
                auth.check(false)
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)

                local session_id = ngx.var.session_id
                local cache = ngx.shared.pod_cache

                local ip = cache:get(session_id)
                if not ip then
                    local ok, err = red:connect("redis.default.svc.cluster.local", 6379)
                    if not ok then
                        ngx.log(ngx.ERR, "failed to connect to redis: ", err)
                        return ngx.exit(500)
                    end

                    ip, err = red:get("route:" .. session_id)
                    if not ip or ip == ngx.null then
                        ngx.log(ngx.WARN, "No route found for session: ", session_id)
                        return ngx.exit(404)
                    end

                    cache:set(session_id, ip, 2)
                end

                ngx.var.target_ip = ip
            }

            if ($rest_uri = "") {
                rewrite ^/cdp/[^/]+$ / break;
            }
            if ($rest_uri != "") {
                rewrite ^/cdp/[^/]+(.*)$ $1 break;
            }

            proxy_pass http://$target_ip:9222;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Kernel API Exposure
        location ~ ^/api/([^/]+)(.*) {
            set $session_id $1;
            set $rest_uri $2;
            set $target_ip '';

            access_by_lua_block {
                local auth = require "auth"
                auth.check(false)
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)

                local session_id = ngx.var.session_id
                local cache = ngx.shared.pod_cache

                local ip = cache:get(session_id)
                if not ip then
                    local ok, err = red:connect("redis.default.svc.cluster.local", 6379)
                    if not ok then
                        ngx.log(ngx.ERR, "failed to connect to redis: ", err)
                        return ngx.exit(500)
                    end

                    ip, err = red:get("route:" .. session_id)
                    if not ip or ip == ngx.null then
                        ngx.log(ngx.WARN, "No route found for session: ", session_id)
                        return ngx.exit(404)
                    end

                    cache:set(session_id, ip, 2)
                end

                ngx.var.target_ip = ip
            }

            if ($rest_uri = "") {
                rewrite ^/api/[^/]+$ / break;
            }
            if ($rest_uri != "") {
                rewrite ^/api/[^/]+(.*)$ $1 break;
            }

            proxy_pass http://$target_ip:10001;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Fallback / Health Check
        location /health {
            return 200 "OK\n";
        }

        # Proxy everything else to Pool Manager (UI + API)
        location / {
            # pool-manager service name in K8s
            proxy_pass http://pool-manager.default.svc.cluster.local:80; 
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
