worker_processes 1;

events {
    worker_connections 10240;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    access_log /dev/stdout;
    error_log /dev/stderr info;

    lua_shared_dict pod_cache 10m;

    resolver RESOLVER_IP valid=5s;

    server {
        listen 80;
        server_name _;

        # Dynamic Path-Based Routing: /browser/<session_id>/...
        location ~ ^/browser/([^/]+)/([^/]+)(.*) {
            set $session_id $1;
            set $token $2;
            set $rest_uri $3;
            set $target_ip '';

            access_by_lua_block {
                local auth = require "auth"
                auth.check(true, ngx.var.token)
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)

                local session_id = ngx.var.session_id
                local cache = ngx.shared.pod_cache

                local ip = cache:get(session_id)
                if not ip then
                    local ok, err = red:connect("redis.default.svc.cluster.local", 6379)
                    if not ok then
                        ngx.log(ngx.ERR, "failed to connect to redis: ", err)
                        return ngx.exit(500)
                    end

                    ip, err = red:get("route:" .. session_id)
                    if not ip or ip == ngx.null then
                        ngx.log(ngx.WARN, "No route found for session: ", session_id)
                        return ngx.exit(404)
                    end

                    cache:set(session_id, ip, 2)
                end

                ngx.var.target_ip = ip
            }

            if ($rest_uri = "") {
                rewrite ^/browser/[^/]+/[^/]+$ / break;
            }
            if ($rest_uri != "") {
                rewrite ^/browser/[^/]+/[^/]+(.*)$ $1 break;
            }

            proxy_pass http://$target_ip;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # CDP Exposure: /cdp/<session_id>/...
        location ~ ^/cdp/([^/]+)(.*) {
            set $session_id $1;
            set $rest_uri $2;
            set $target_ip '';

            access_by_lua_block {
                local auth = require "auth"
                auth.check(false) -- Allow CDP access without token for now (or fix if needed)
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)

                local session_id = ngx.var.session_id
                local cache = ngx.shared.pod_cache

                local ip = cache:get("cdp:" .. session_id)
                if not ip then
                    local ok, err = red:connect("redis.default.svc.cluster.local", 6379)
                    if not ok then
                        ngx.log(ngx.ERR, "failed to connect to redis: ", err)
                        return ngx.exit(500)
                    end

                    ip, err = red:get("route:cdp:" .. session_id)
                    if not ip or ip == ngx.null then
                        ngx.log(ngx.WARN, "No CDP route found for session: ", session_id)
                        return ngx.exit(404)
                    end

                    cache:set("cdp:" .. session_id, ip, 2)
                end

                ngx.var.target_ip = ip
            }

            if ($rest_uri = "") {
                rewrite ^/cdp/[^/]+$ / break;
            }
            if ($rest_uri != "") {
                rewrite ^/cdp/[^/]+(.*)$ $1 break;
            }

            proxy_pass http://$target_ip;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Kernel API Exposure: /api/<session_id>/...
        location ~ ^/api/([^/]+)(.*) {
            set $session_id $1;
            set $rest_uri $2;
            set $target_ip '';

            access_by_lua_block {
                local auth = require "auth"
                auth.check(false)
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)

                local session_id = ngx.var.session_id
                local cache = ngx.shared.pod_cache

                local ip = cache:get("api:" .. session_id)
                if not ip then
                    local ok, err = red:connect("redis.default.svc.cluster.local", 6379)
                    if not ok then
                        ngx.log(ngx.ERR, "failed to connect to redis: ", err)
                        return ngx.exit(500)
                    end

                    ip, err = red:get("route:api:" .. session_id)
                    if not ip or ip == ngx.null then
                        ngx.log(ngx.WARN, "No API route found for session: ", session_id)
                        return ngx.exit(404)
                    end

                    cache:set("api:" .. session_id, ip, 2)
                end

                ngx.var.target_ip = ip
            }

            if ($rest_uri = "") {
                rewrite ^/api/[^/]+$ / break;
            }
            if ($rest_uri != "") {
                rewrite ^/api/[^/]+(.*)$ $1 break;
            }

            proxy_pass http://$target_ip;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Fallback / Health Check
        location /health {
            return 200 "OK\n";
        }

        # Proxy everything else to Pool Manager (UI + API)
        location / {
            proxy_pass http://pool-manager.default.svc.cluster.local:80; 
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
