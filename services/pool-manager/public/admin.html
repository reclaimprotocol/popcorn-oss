<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Popcorn Admin</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --success: #22c55e;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--accent);
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }

        .stat {
            font-size: 2rem;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }

        input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 0.75rem;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
        }

        .tag {
            background: var(--success);
            color: black;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .empty {
            opacity: 0.5;
            font-style: italic;
        }
    </style>
</head>

<body>
    <h1>🍿 Popcorn Pool Manager</h1>

    <div class="grid">
        <!-- CLAIM SECTION -->
        <div class="card">
            <h2>🚀 New Session</h2>
            <form id="claimForm">
                <label style="display:block; margin-bottom:0.5rem">Session ID / User ID</label>
                <input type="text" id="sessionId" placeholder="e.g. user-123" required>
                <button type="submit">Claim Browser</button>
            </form>
            <div id="result"
                style="margin-top: 1rem; display: none; background: #064e3b; padding: 1rem; border-radius: 6px;"></div>
        </div>

        <!-- STATS SECTION -->
        <div class="card">
            <h2>📊 Pool Stats</h2>
            <div style="display: flex; gap: 2rem; margin-bottom: 1rem;">
                <div>
                    <div style="font-size: 0.9rem; opacity: 0.7;">Ready GameServers</div>
                    <div class="stat" id="idleCount">-</div>
                </div>
                <div>
                    <div style="font-size: 0.9rem; opacity: 0.7;">Allocated Sessions</div>
                    <div class="stat" id="activeCount">-</div>
                </div>
                <div>
                    <div style="font-size: 0.9rem; opacity: 0.7;">Total GameServers</div>
                    <div class="stat" id="totalPods">-</div>
                </div>
            </div>
        </div>

        <!-- UNIFIED POD LIST -->
        <div class="card" style="grid-column: span 2;">
            <h2>🎮 Agones GameServers</h2>
            <ul id="podList"></ul>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function fetchStats() {
            try {
                // 1. Get simplified server list
                const res = await fetch(`${API_URL}/admin/servers`);
                const servers = await res.json();

                const idleCount = servers.filter(s => s.status === 'Ready').length;
                const activeCount = servers.filter(s => s.status === 'Allocated').length;

                document.getElementById('idleCount').innerText = idleCount;
                document.getElementById('activeCount').innerText = activeCount;
                document.getElementById('totalPods').innerText = servers.length;

                const podList = document.getElementById('podList');

                if (!servers.length) {
                    podList.innerHTML = '<div class="empty">No GameServers found in cluster</div>';
                    return;
                }

                // 2. Build list items (fetch session details for allocated pods lazily or just show status)
                // Since the new API separates concerns, we don't have a bulk "all sessions" endpoint anymore.
                // We will just show the server list. If we need session info, we'd need to fetch it by ID,
                // but the server list doesn't have session IDs coupled anymore in the minimal API.
                // However, the admin needs to see which session is on which pod to Kill/Open.

                // WAIT -> The user request said "return minimum info and just return the status used by admin".
                // But the Admin UI heavily relies on knowing the Session ID to generate links.
                // If Agones.listGameServers() doesn't return Session ID (it's in Redis), we have a disconnect.
                // 
                // To fix this without re-introducing the bulk API:
                // We can assume the admin panel is now "Server Centric" mostly. 
                // BUT, to "OPEN" a session, we need the token/ID. 

                // Let's modify the UI to be simpler as requested, but we still need a way to see active sessions.
                // Since the user asked for "api to list server that will return minimum info", I will respect that.
                // P.S. The previous implementation mapped Redis sessions to Pods. 
                // Since we removed that bulk mapping from /admin/api, we can't easily show "Open" links here 
                // unless we add a separate "GET /admin/sessions" or similar, OR we just accept that the 
                // server list is now minimal.

                // HOWEVER, `Agones.listGameServers` in `index.ts` still returns `name` (pod name).
                // `DB.getStats()` had `activeSessions` (Redis).
                // If we want to keep the UI functional (Open/Kill), we might need `GET /admin/sessions` too.
                // OR, we just show the simplified server list as requested and maybe a separate "Check Session" box.

                // Given "api to fetch session info for 1 session used by admin", 
                // I will add a "Lookup Session" feature in the UI instead of auto-populating all links,
                // OR I will just render the list of servers.

                // Visualizing the list:
                podList.innerHTML = servers.map(p => {
                    let stateColor = '#64748b';
                    if (p.status === 'Ready') stateColor = '#22c55e';
                    else if (p.status === 'Allocated') stateColor = '#eab308';
                    else if (p.status.startsWith('Shut')) stateColor = '#ef4444';

                    const appStateHtml = `<span class="tag" style="background:${stateColor}; color:${p.status === 'Ready' || p.status === 'Allocated' ? 'black' : 'white'}">${p.status}</span>`;

                    // Simple Force Shutdown for now since we don't have session ID mapping in this minimal list
                    let actionHtml = '';

                    if (p.sessionId) {
                        actionHtml += `<button style="background:#3b82f6; width:auto; padding:0.25rem 0.5rem; font-size:0.8rem; margin-right:0.5rem" onclick="openLiveView('${p.sessionId}')">OPEN</button>`;
                    }

                    if (p.status === 'Allocated' || p.status === 'Ready') {
                        actionHtml += `<button style="background:#7f1d1d; width:auto; padding:0.25rem 0.5rem; font-size:0.8rem; margin-left:auto" onclick="forceShutdownGS('${p.name}')">SHUTDOWN</button>`;
                    }

                    return `<li>
                        <div style="display:flex; align-items:center; width:100%; gap:1rem">
                            <div style="display:flex; flex-direction:column">
                                <span style="font-weight:bold">${p.name}</span>
                                ${p.sessionId ? `<span style="font-size:0.75rem; color:#94a3b8; font-family:monospace">${p.sessionId}</span>` : ''}
                            </div>
                            ${appStateHtml}
                            ${actionHtml}
                        </div>
                    </li>`;
                }).join('');

            } catch (e) {
                console.error("Failed to fetch stats:", e);
            }
        }

        async function openLiveView(sid) {
            try {
                const res = await fetch(`${API_URL}/session/${sid}`);
                const data = await res.json();
                if (data.success && data.url) {
                    window.open(data.url, '_blank');
                } else {
                    alert('Failed to get session URL');
                }
            } catch (e) {
                console.error(e);
                alert('Error fetching session details');
            }
        }

        async function killSession(sid) {
            if (!confirm(`Kill session ${sid}?`)) return;
            await fetch(`${API_URL}/session/${sid}`, { method: 'DELETE' });
            fetchStats();
        }

        async function forceShutdownGS(name) {
            if (!confirm(`Force shutdown GameServer ${name}?`)) return;
            await fetch(`${API_URL}/admin/gameserver/${name}`, { method: 'DELETE' });
            fetchStats();
        }

        document.getElementById('claimForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sessionId = document.getElementById('sessionId').value;

            try {
                const res = await fetch(`${API_URL}/session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });

                const data = await res.json();
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';

                if (res.ok) {
                    resultDiv.innerHTML = `
                        <div>✅ <b>Success!</b></div>
                        <div style="margin-top:0.5rem; font-size:0.9rem">Session ID: ${data.sessionId}</div>
                        <div style="display:flex; gap:0.5rem; margin-top:0.5rem">
                            <a href="${data.url}" target="_blank" style="background:white; color:black; padding:0.25rem 0.5rem; border-radius:4px; text-decoration:none; font-weight:bold">Open Gateway</a>
                            <a href="${data.cdpUrl}" target="_blank" style="background:#eab308; color:black; padding:0.25rem 0.5rem; border-radius:4px; text-decoration:none; font-weight:bold">CDP</a>
                            <a href="${data.apiUrl}" target="_blank" style="background:#3b82f6; color:white; padding:0.25rem 0.5rem; border-radius:4px; text-decoration:none; font-weight:bold">Kernel API</a>
                        </div>
                    `;
                    fetchStats();
                } else {
                    resultDiv.innerHTML = `❌ Error: ${data.error}`;
                    resultDiv.style.background = '#7f1d1d';
                }
            } catch (err) {
                alert('Request failed');
            }
        });

        // Poll every 2 seconds
        fetchStats();
        setInterval(fetchStats, 2000);
    </script>
</body>

</html>
