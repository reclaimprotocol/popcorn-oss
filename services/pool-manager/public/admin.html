<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Popcorn Admin</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --success: #22c55e;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--accent);
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }

        .stat {
            font-size: 2rem;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }

        input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 0.75rem;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
        }

        .tag {
            background: var(--success);
            color: black;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .empty {
            opacity: 0.5;
            font-style: italic;
        }
    </style>
</head>

<body>
    <h1>🍿 Popcorn Pool Manager</h1>

    <div class="grid">
        <!-- CLAIM SECTION -->
        <div class="card">
            <h2>🚀 New Session</h2>
            <form id="claimForm">
                <label style="display:block; margin-bottom:0.5rem">Session ID / User ID</label>
                <input type="text" id="sessionId" placeholder="e.g. user-123" required>
                <button type="submit">Claim Browser</button>
            </form>
            <div id="result"
                style="margin-top: 1rem; display: none; background: #064e3b; padding: 1rem; border-radius: 6px;"></div>
        </div>

        <!-- STATS SECTION -->
        <div class="card">
            <h2>📊 Pool Stats</h2>
            <div style="display: flex; gap: 2rem; margin-bottom: 1rem;">
                <div>
                    <div style="font-size: 0.9rem; opacity: 0.7;">Ready GameServers</div>
                    <div class="stat" id="idleCount">-</div>
                </div>
                <div>
                    <div style="font-size: 0.9rem; opacity: 0.7;">Allocated Sessions</div>
                    <div class="stat" id="activeCount">-</div>
                </div>
                <div>
                    <div style="font-size: 0.9rem; opacity: 0.7;">Total GameServers</div>
                    <div class="stat" id="totalPods">-</div>
                </div>
            </div>
        </div>

        <!-- UNIFIED POD LIST -->
        <div class="card" style="grid-column: span 2;">
            <h2>🎮 Agones GameServers</h2>
            <ul id="podList"></ul>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function fetchStats() {
            try {
                const res = await fetch(`${API_URL}/admin/api`);
                const data = await res.json();

                // Robust assignment with fallback to 0
                document.getElementById('idleCount').innerText = data.readyCount !== undefined ? data.readyCount : 0;
                document.getElementById('activeCount').innerText = data.activeCount !== undefined ? data.activeCount : 0;
                document.getElementById('totalPods').innerText = data.totalCount !== undefined ? data.totalCount : 0;

                const podList = document.getElementById('podList');

                if (!data.k8sPods || !data.k8sPods.length) {
                    podList.innerHTML = '<div class="empty">No GameServers found in cluster</div>';
                    return;
                }

                // Create a map for active sessions for easy lookup: podName -> session
                const activeMap = {};
                if (data.activeSessions) {
                    Object.entries(data.activeSessions).forEach(([sid, session]) => {
                        if (session.name) activeMap[session.name] = { ...session, sid };
                    });
                }

                podList.innerHTML = data.k8sPods.map(p => {
                    const hb = data.heartbeats ? data.heartbeats[p.name] : null;
                    const ago = hb ? Math.round((Date.now() - parseInt(hb)) / 1000) + 's ago' : 'N/A';

                    // Determine App State Colors/Tags
                    let stateColor = '#64748b'; // Unknown
                    let appTag = p.status;

                    if (p.status === 'Ready') {
                        stateColor = '#22c55e'; // Success green
                    } else if (p.status === 'Allocated') {
                        stateColor = '#eab308'; // Active yellow
                    } else if (p.status === 'Starting' || p.status === 'Scheduled') {
                        stateColor = '#3b82f6'; // Info blue
                    } else if (p.status === 'Shutdown' || p.status === 'Terminating') {
                        stateColor = '#ef4444'; // Error red
                    } else if (p.status === 'Unhealthy') {
                        stateColor = '#7f1d1d'; // Dark red
                    }

                    let appStateHtml = `<span class="tag" style="background:${stateColor}; color:${p.status === 'Ready' || p.status === 'Allocated' ? 'black' : 'white'}">${appTag}</span>`;

                    let actionHtml = '';
                    let detailsHtml = '';

                    // Logic for associating with a session OR showing forced shutdown for orphans
                    if (activeMap[p.name]) {
                        const s = activeMap[p.name];
                        detailsHtml = `<span style="font-size:0.8rem; margin-left:0.5rem">👤 ${s.sid}</span>`;
                        const openBtn = `<a href="${s.url}" target="_blank" style="background:#22c55e; color:black; padding:0.25rem 0.5rem; font-size:0.8rem; margin-left:1rem; text-decoration:none; border-radius:6px; font-weight:bold; display:inline-block">OPEN</a>`;
                        const killBtn = `<button style="background:#7f1d1d; width:auto; padding:0.25rem 0.5rem; font-size:0.8rem; margin-left:0.5rem" onclick="killSession('${s.sid}')">KILL</button>`;
                        actionHtml = openBtn + killBtn;
                    } else if (p.status === 'Allocated') {
                        // Orphaned allocation: Allocated in Agones but no record in Redis
                        detailsHtml = `<span style="font-size:0.8rem; margin-left:0.5rem; color:#ef4444">⚠️ Orphaned</span>`;
                        actionHtml = `<button style="background:#7f1d1d; width:auto; padding:0.25rem 0.5rem; font-size:0.8rem; margin-left:1rem" onclick="forceShutdownGS('${p.name}')">FORCE SHUTDOWN</button>`;
                    }

                    return `<li>
                        <div style="display:flex; align-items:center; width:100%; gap:1rem">
                            <div style="display:flex; flex-direction:column; min-width: 250px;">
                                <span style="font-weight:bold">${p.name}</span>
                                <span style="font-size:0.8rem; opacity:0.6">${p.url || 'Initializing...'}</span>
                            </div>

                            <div style="display:flex; flex-direction:column; align-items:center; gap:0.25rem; margin-left:1rem">
                                <span style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; opacity:0.7">Agones State</span>
                                ${appStateHtml}
                            </div>

                            <div style="display:flex; flex-direction:column; align-items:center; gap:0.25rem; margin-left:1rem">
                                <span style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; opacity:0.7">Heartbeat</span>
                                <span>💓 ${ago}</span>
                            </div>

                            <div style="margin-left:auto; display:flex; align-items:center">
                                ${detailsHtml}
                                ${actionHtml}
                            </div>
                        </div>
                    </li>`;
                }).join('');
            } catch (e) {
                console.error("Failed to fetch stats:", e);
            }
        }

        async function killSession(sid) {
            if (!confirm(`Kill session ${sid}?`)) return;
            await fetch(`${API_URL}/session/${sid}`, { method: 'DELETE' });
            fetchStats();
        }

        async function forceShutdownGS(name) {
            if (!confirm(`Force shutdown GameServer ${name}?`)) return;
            await fetch(`${API_URL}/admin/gameserver/${name}`, { method: 'DELETE' });
            fetchStats();
        }

        document.getElementById('claimForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sessionId = document.getElementById('sessionId').value;

            try {
                const res = await fetch(`${API_URL}/session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });

                const data = await res.json();
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';

                if (res.ok) {
                    resultDiv.innerHTML = `✅ Assigned! <br><a href="${data.url}" target="_blank" style="display:inline-block; margin-top:0.5rem; background:white; color:black; padding:0.5rem 1rem; border-radius:4px; text-decoration:none; font-weight:bold">Open Session</a>`;
                    fetchStats();
                } else {
                    resultDiv.innerHTML = `❌ Error: ${data.error}`;
                    resultDiv.style.background = '#7f1d1d';
                }
            } catch (err) {
                alert('Request failed');
            }
        });

        // Poll every 2 seconds
        fetchStats();
        setInterval(fetchStats, 2000);
    </script>
</body>

</html>
